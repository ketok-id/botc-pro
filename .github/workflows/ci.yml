name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs when new commits land on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips the electron-builder postinstall; the test
        # suite doesn't need it and it needs devDependencies otherwise.
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Syntax-check all JS sources
        run: |
          set -e
          find src -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          node --check test-st-qol.js

      - name: Run engine smoke tests
        run: node test-st-qol.js

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: botc-pro/server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        # Boot the container, wait for it to answer on port 7878, then stop.
        run: |
          set -e
          docker run --rm -d --name botc-ci -p 7878:7878 botc-pro/server:ci
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:7878/ > /dev/null; then
              echo "server is responding"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:7878/ > /dev/null
          curl -fsS http://127.0.0.1:7878/js/platform.js > /dev/null
          docker stop botc-ci
